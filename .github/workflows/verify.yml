name: verify

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the triggering commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up competitive-verifier
        uses: competitive-verifier/actions/setup@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          package: competitive-verifier==4.1.2
          cache-pip: true

      - name: Resolve verification targets
        uses: competitive-verifier/actions/oj-resolve@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          output-path: verify_files.json
          exclude: |
            node_modules
            test/benchmark
          config: .competitive-verifier/config.toml

      - name: Parse Doxygen comments
        uses: competitive-verifier/actions/parse-doxygen@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          verify-files: verify_files.json

      - name: Upload verification targets
        uses: competitive-verifier/actions/upload-verify-artifact@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          file: verify_files.json

      - name: Count bundled files
        id: bundled
        run: echo "count=$(find .competitive-verifier/bundled -type f | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Upload bundled files
        if: steps.bundled.outputs.count > 0
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Bundled-${{ runner.os }}
          path: .competitive-verifier/bundled
          if-no-files-found: error
          retention-days: 1

  verify:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SPLIT_SIZE: 4
    strategy:
      fail-fast: false
      matrix:
        index: ['00', '01', '02', '03']

    steps:
      - name: Check out the triggering commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download verification targets
        uses: competitive-verifier/actions/download-verify-artifact@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2

      - name: Compute verification cache key
        id: verifier-cache
        run: |
          toolchain_hash=$(g++ --version | sha256sum | cut -d ' ' -f 1)
          echo "toolchain-hash=$toolchain_hash" >> "$GITHUB_OUTPUT"

      - name: Restore previous verification result
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: previous-result.json
          key: >-
            competitive-verifier-result-v1-${{ runner.os }}-${{
            hashFiles('.competitive-verifier/config.toml', '.competitive-verifier/g++',
            'requirements.txt', '.github/workflows/verify.yml') }}-${{
            steps.verifier-cache.outputs.toolchain-hash }}-${{ github.sha }}
          restore-keys: |
            competitive-verifier-result-v1-${{ runner.os }}-${{ hashFiles('.competitive-verifier/config.toml', '.competitive-verifier/g++', 'requirements.txt', '.github/workflows/verify.yml') }}-${{ steps.verifier-cache.outputs.toolchain-hash }}-

      - name: Find previous verification result
        id: previous-result
        run: |
          if test -f previous-result.json; then
            echo "path=previous-result.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up competitive-verifier
        uses: competitive-verifier/actions/setup@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          package: competitive-verifier==4.1.2
          cache-pip: true

      - name: Verify library
        uses: competitive-verifier/actions/verify@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          destination: ${{ runner.temp }}/result.json
          prev-result: ${{ steps.previous-result.outputs.path }}
          split-size: ${{ env.SPLIT_SIZE }}
          split-index: ${{ matrix.index }}
          timeout: 1800

      - name: Upload verification result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Result-${{ runner.os }}-${{ matrix.index }}
          path: ${{ runner.temp }}/result.json
          if-no-files-found: error
          retention-days: 1

  merge-verify-results:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the triggering commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Download verification targets and results
        id: artifacts
        uses: competitive-verifier/actions/download-verify-artifact@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          download-all: true
          artifact-root: .artifacts

      - name: Set up competitive-verifier
        uses: competitive-verifier/actions/setup@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          package: competitive-verifier==4.1.2
          cache-pip: true

      - name: Merge verification results
        uses: competitive-verifier/actions/merge-result@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          result-files: ${{ steps.artifacts.outputs.artifacts-root }}/Result-${{ runner.os }}-*/result.json
          output-path: previous-result.json

      - name: Check merged verification result
        uses: competitive-verifier/actions/check@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          verify-result: previous-result.json

      - name: Compute verification cache key
        id: verifier-cache
        run: |
          toolchain_hash=$(g++ --version | sha256sum | cut -d ' ' -f 1)
          echo "toolchain-hash=$toolchain_hash" >> "$GITHUB_OUTPUT"

      - name: Save verification result
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: previous-result.json
          key: >-
            competitive-verifier-result-v1-${{ runner.os }}-${{
            hashFiles('.competitive-verifier/config.toml', '.competitive-verifier/g++',
            'requirements.txt', '.github/workflows/verify.yml') }}-${{
            steps.verifier-cache.outputs.toolchain-hash }}-${{ github.sha }}

  build:
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]')
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the triggering commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '24'
          cache: npm

      - name: Install Vivliostyle
        run: npm install --global @vivliostyle/cli clang-format

      - name: Install dependencies
        run: npm ci

      - name: Build PDF
        run: make build

      - name: Package generated files
        run: |
          tar -czf publish-output.tar.gz \
            notebook.pdf \
            build/notebook.css \
            build/notebook.html \
            .competitive-verifier/docs/_config.yml \
            src

      - name: Upload generated files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: publish-output
          path: publish-output.tar.gz
          if-no-files-found: error
          retention-days: 1

  docs-and-check:
    if: >-
      always() &&
      needs.setup.result == 'success' &&
      needs.verify.result == 'success'
    needs: [setup, verify, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: read

    steps:
      - name: Check out the triggering commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download verification targets and results
        id: artifacts
        uses: competitive-verifier/actions/download-verify-artifact@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          download-all: true
          artifact-root: .artifacts

      - name: Restore bundled files
        run: |
          rm -rf .competitive-verifier/bundled
          if test -d "$SOURCE_DIR"; then
            mv "$SOURCE_DIR" .competitive-verifier/bundled
          fi
        env:
          SOURCE_DIR: .artifacts/Bundled-${{ runner.os }}

      - name: Restore generated files
        if: needs.build.result == 'success'
        run: tar -xzf .artifacts/publish-output/publish-output.tar.gz

      - name: Add notebook files to documentation
        if: needs.build.result == 'success'
        run: |
          mkdir -p .competitive-verifier/docs/static
          cp notebook.pdf .competitive-verifier/docs/static/
          cp build/notebook.html .competitive-verifier/docs/static/
          cp build/*.css .competitive-verifier/docs/static/

      - name: Set up competitive-verifier
        uses: competitive-verifier/actions/setup@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          package: competitive-verifier==4.1.2
          cache-pip: true

      - name: Generate documentation
        uses: competitive-verifier/actions/docs@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          verify-result: ${{ steps.artifacts.outputs.artifacts-root }}/Result-*/result.json
          exclude: |
            node_modules
            test/benchmark
          destination: _jekyll
          write-summary: true

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Build documentation with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: _jekyll
          destination: _site

      - name: Package documentation
        run: tar -czf site-output.tar.gz -C _site .

      - name: Upload documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site-output
          path: site-output.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Check verification results
        uses: competitive-verifier/actions/check@f73bf3d0365949089e9ed1fc530322720b5cf3a7 # v2
        with:
          verify-result: ${{ steps.artifacts.outputs.artifacts-root }}/Result-*/result.json

  publish:
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]')
    needs: [build, docs-and-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out target branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref || 'main' }}
          fetch-depth: 0

      - name: Ensure target branch has not advanced
        env:
          EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          ACTUAL_SHA=$(git rev-parse HEAD)
          if [[ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]]; then
            echo "target branch advanced from $EXPECTED_SHA to $ACTUAL_SHA; refusing to publish stale output"
            exit 1
          fi

      - name: Download generated files
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: publish-output

      - name: Download documentation
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: site-output

      - name: Extract generated files
        run: tar -xzf publish-output.tar.gz

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit generated files
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || 'main' }}
        run: |
          git add -- \
            notebook.pdf \
            build/notebook.css \
            build/notebook.html \
            .competitive-verifier/docs/_config.yml \
            src
          if ! git diff --cached --quiet; then
            git commit -m "[skip actions] build PDF"
            git push origin "HEAD:refs/heads/$TARGET_BRANCH"
          fi

      - name: Publish documentation to gh-pages
        if: github.event_name == 'push'
        run: |
          DIR=$(mktemp -d)
          tar -xzf site-output.tar.gz -C "$DIR"
          git clean -dfx
          git switch gh-pages
          git rm -rf --ignore-unmatch .
          cp -R "$DIR"/. .
          git add -- .
          if ! git diff --cached --quiet; then
            git commit -m "build documentation"
            git push origin gh-pages
          fi
